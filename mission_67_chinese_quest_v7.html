*{box-sizing:border-box} body{margin:0;background:#050506;color:#f7f0e8;font-family:Arial, sans-serif;min-height:100vh;background-image:radial-gradient(circle at top,#261013,#050506 55%);}

.btns{display:grid;gap:10px;margin-top:12px} button{border:1px solid #ff513f;background:#180809;color:#fff;border-radius:14px;padding:14px 16px;font-size:21px;text-align:left;cursor:pointer;transition:.15s}button:hover{background:#2a0c0c} .next{background:#8b160e;font-weight:bold;text-align:center;float:right}

function audio(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function toggleSound(){ soundEnabled=!soundEnabled; document.getElementById('soundToggle').textContent=soundEnabled?'🔊 звук: вкл':'🔇 звук: выкл'; if(soundEnabled){ try{audio().resume()}catch(e){} } }
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function escapeAttr(s){ return String(s).replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function beep(ok){ if(!soundEnabled)return; try{ const ctx=audio(); const now=ctx.currentTime; const notes=ok?[660,880,1175]:[180,120]; notes.forEach((f,i)=>{const o=ctx.createOscillator(); const g=ctx.createGain(); o.type=ok?'sine':'sawtooth'; o.frequency.value=f; g.gain.setValueAtTime(0.0001,now+i*.12); g.gain.exponentialRampToValueAtTime(ok?0.18:0.12,now+i*.12+.02); g.gain.exponentialRampToValueAtTime(0.0001,now+i*.12+.16); o.connect(g); g.connect(ctx.destination); o.start(now+i*.12); o.stop(now+i*.12+.18);}); }catch(e){} }
function speak(text, lang='zh-CN', rate=.82){ if(!soundEnabled)return; try{ const u=new SpeechSynthesisUtterance(text); u.lang=lang; u.rate=rate; speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e){} }
function cheer67(){
  if(!soundEnabled)return;
  try{
    correctSound.pause();
    correctSound.currentTime=0;
    correctSound.play().catch(()=>{});
  }catch(e){
    try{ const u=new SpeechSynthesisUtterance('six seven!'); u.lang='en-US'; u.rate=.9; u.pitch=1.35; u.volume=1; speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e2){}
  }
}
function tick(){time--; document.getElementById('time').textContent=time; document.getElementById('bar').style.width=(100-time/67*100)+'%'; if(time<=0){clearInterval(timer); showResult(false,'Время вышло! Можно продолжить.'); beep(false);}}
function startTimer(){clearInterval(timer); time=67; document.getElementById('time').textContent=time; document.getElementById('bar').style.width='0%'; timer=setInterval(tick,1000)}
function readBlock(text){return `<div class="readrow"><div class="cn">${text}</div><button class="soundbtn" onclick="speak(${JSON.stringify(text)})">🔊</button></div>`}
function render(){locked=false; startTimer(); const l=levels[level]; const g=document.getElementById('game');
 if(l.type==='intro'){g.innerHTML=`<h2 class="level-title">${l.title}</h2><p class="hint">${l.text}</p><div class="imgbox"><img src="${imgs[l.img]}"></div><div class="footer"><span class="small">Нажми START — начнётся раунд на 67 секунд.</span><button class="next" onclick="next()">START 67</button></div>`; return;}
 if(l.type==='chooseImg'){const opts=shuffle(l.options); g.innerHTML=`<h2 class="level-title">${l.title}</h2>${readBlock(l.prompt)}<p class="hint">Прочитай китайское предложение и выбери подходящую картинку.</p><div class="grid">${opts.map((o,i)=>`<div class="imgbox" onclick="answer(${o===l.correct},this)"><span class="label">${String.fromCharCode(65+i)}</span><img src="${imgs[o]}"></div>`).join('')}</div><div id="res"></div>`; return;}
 if(l.type==='chooseText'){const opts=shuffle(l.options.map((o,i)=>({text:o, ok:i===l.correct}))); g.innerHTML=`<h2 class="level-title">${l.title}</h2><div class="imgbox"><img src="${imgs[l.img]}"></div><p class="hint">Прочитай варианты и выбери точное описание.</p><div class="btns">${opts.map((it,i)=>`<button onclick="answer(${it.ok},this)">${i+1}. ${it.text}</button>`).join('')}</div><div id="res"></div>`; return;}
 if(l.type==='error'){const opts=shuffle(l.options); g.innerHTML=`<h2 class="level-title">${l.title}</h2><div class="imgbox"><img src="${imgs[l.img]}"></div><p class="hint">Прочитай предложение. Что в нём не так?</p>${readBlock(l.wrong)}<div class="btns">${opts.map(o=>`<button onclick='answer(${JSON.stringify(o===l.answer)},this)'>${o}</button>`).join('')}</div><div id="res"></div>`; return;}
 if(l.type==='speak'){g.innerHTML=`<h2 class="level-title">${l.title}</h2><div class="imgbox"><img src="${imgs[l.img]}"></div><div class="speak"><b>Задание:</b> сказать вслух по-китайски, что происходит на картинке. Можно использовать слова: 吃 / 喝 / 坐 / 骑 / 去 / 在.</div><button onclick="answer(true,this)">Готово ✅</button><button onclick="answer(false,this)">Ещё раз</button><div id="res"></div>`; return;}
 if(l.type==='build'){const opts=shuffle(l.options); g.innerHTML=`<h2 class="level-title">${l.title}</h2><p class="hint">Слова: ${l.prompt}</p><div class="btns">${opts.map(o=>`<button onclick='answer(${JSON.stringify(o===l.correct)},this)'>${o}</button>`).join('')}</div><div id="res"></div>`; return;}
 if(l.type==='final'){const opts=shuffle(l.options.map((o,i)=>({text:o, ok:i===l.correct}))); g.innerHTML=`<h2 class="level-title">${l.title}</h2>${readBlock(l.text)}<p class="hint">${l.q}</p><div class="btns">${opts.map((it,i)=>`<button onclick="answer(${it.ok},this)">${it.text}</button>`).join('')}</div><div id="res"></div>`; return;}
}
function answer(ok,el){if(locked)return; locked=true; clearInterval(timer); if(ok){combo++; score += 10 + combo*2 + Math.max(0,time); el.classList.add('good'); cheer67(); showResult(true, combo>=2?'SIX SEVEN!!! COMBO!':'SIX SEVEN!')} else {beep(false); combo=0; el.classList.add('bad'); showResult(false,'Не совсем. Читаем ещё раз.')} document.getElementById('score').textContent=score; document.getElementById('combo').textContent=combo;}
function showResult(ok,msg){const r=document.getElementById('res'); if(!r)return; r.innerHTML=`<div class="result ${ok?'ok':'no'}">${msg}</div><div class="footer"><span class="small">Следующее задание можно открыть сразу.</span><button class="next" onclick="next()">Дальше →</button></div>`;}
function next(){level++; if(level>=levels.length){clearInterval(timer); document.getElementById('game').innerHTML=`<h2 class="level-title">MISSION COMPLETE</h2><p class="hint">Итог: ${score} очков. 67!</p><div class="imgbox"><img src="${imgs[11]}"></div><button class="next" onclick="location.reload()">Играть снова</button>`; beep(true); return} render()}
render();
</script></body></html>
